<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>WH40K-TTS</title>
  <script>
    // Redirect SPA routes to index.html for GitHub Pages
    // Preserves path, query, and hash
    var l = window.location;
    var repo = l.pathname.split('/')[1];
    var path = l.pathname.slice(repo.length + 1) || '/';
    l.replace(
      l.protocol + '//' + l.hostname +
      (l.port ? ':' + l.port : '') +
      '/' + repo + '/?p=' + encodeURIComponent(path + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
