<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>404 - Not Found</title>
  <script type="text/javascript">
    // This script redirects users to the index.html page while preserving the path they tried to access
    var path = window.location.pathname;
    var search = window.location.search;
    window.location.replace("/" + path + search + "#!");
    // If the redirection to /index.html is needed explicitly for some GH Pages configs:
    // window.location.replace("/index.html" + "?p=" + path + search);
  </script>
</head>
<body>
  <p>Redirecting to the home page...</p>
</body>
</html>
