<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>WH40K-TTS</title>
  <script>
    // Redirige rutas SPA a index.html para GitHub Pages con dominio personalizado.
    // Con dominio personalizado la URL base es simplemente el dominio raíz,
    // no hay prefijo de repositorio.
    var l = window.location;
    var path = l.pathname || '/';
    l.replace(
      l.protocol + '//' + l.hostname +
      (l.port ? ':' + l.port : '') +
      '/?p=' + encodeURIComponent(path + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
